<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-site-verification" content="s5UsLHHwnBaSLizhONlMdphAfz3ra5hN95DuyPnTJnw" />

  <!-- CSP is enforced via HTTP response headers in vercel.json -->

  <!-- Font preconnect for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

  <!-- Regional targeting -->
  <link rel="alternate" hreflang="en-za" href="https://mosesnyanzi.co.za/" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- All SEO meta tags (title, description, OG, Twitter, JSON-LD) are
       injected per-page by React Helmet in each page component. -->
</head>

<body>
  <script>
    // Prevent FOUC: apply dark class before first paint
    (function () { var t; try { t = localStorage.getItem("mn-theme") } catch (e) { } if (!t) t = window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light"; if (t === "dark") document.documentElement.classList.add("dark") })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
